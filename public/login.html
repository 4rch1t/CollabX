<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — CollabX</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="sparkle sparkle-1" style="color:#fff">✦</div>
  <div class="sparkle sparkle-3" style="color:#fff">✧</div>
  <div class="sparkle sparkle-5" style="color:#FFD54F">✦</div>
  <div class="auth-card">
    <h1>Log In</h1>
    <p class="subtitle">Welcome back to CollabX</p>
    <div class="auth-error" id="error"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@university.edu" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-dark">Log In →</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/register.html">Sign up</a></p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (isLoggedIn()) window.location.href = '/dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'Logging in...';

    try {
      const data = await api('/auth/login', {
        method: 'POST',
        body: { email: document.getElementById('email').value, password: document.getElementById('password').value }
      });
      setAuth(data.token, data.user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Log In →';
    }
  });
</script>
</body>
</html>
